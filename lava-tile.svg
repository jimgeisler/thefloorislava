<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <filter id="lava" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.012" numOctaves="4" seed="7" stitchTiles="stitch" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 2.4 -0.6
        0 0 0 1.0 -0.4
        0 0 0 0.2 -0.05
        0 0 0 0   1"/>
    </filter>
    <filter id="cracks" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.05 0.04" numOctaves="2" seed="3" stitchTiles="stitch" result="t"/>
      <feColorMatrix in="t" type="matrix" values="
        0 0 0 -1.6 1.0
        0 0 0 -1.6 0.5
        0 0 0 -1.6 0.1
        0 0 0  3.5 -1.6"/>
    </filter>
  </defs>
  <rect width="256" height="256" fill="#3a0a00"/>
  <rect width="256" height="256" filter="url(#lava)"/>
  <rect width="256" height="256" filter="url(#cracks)" style="mix-blend-mode:screen;opacity:0.55"/>
</svg>
